<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing — Sunwing RMS</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="data.js"></script>
  <style>
    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: var(--body-bg);
    }
    .placeholder-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 420px;
      gap: 14px;
    }
    .placeholder-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .placeholder-icon svg { width: 36px; height: 36px; }
    .placeholder-title {
      font-family: 'Archivo', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 4px 0 0;
    }
    .placeholder-subtext {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin: 0;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Top Nav ── -->
  <nav class="topnav">
    <a href="pricing.html" class="logo">
      <span class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="4" fill="#fff"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M4.9 19.1L7 17M17 7l2.1-2.1" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="logo-text">Sunwing RMS</span>
    </a>

    <div class="nav-tabs">
      <a href="pricing.html" class="nav-tab active">Pricing</a>
      <a href="demand.html"  class="nav-tab">Demand Forecast</a>
      <a href="#"            class="nav-tab">Rules &amp; Parameters</a>
    </div>

    <div class="nav-divider"></div>

    <div style="position:relative;">
      <button class="nav-menu-btn" id="menuBtn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-dropdown" id="navDropdown">
        <a href="#">Settings</a>
        <a href="#">Reports</a>
      </div>
    </div>
  </nav>

  <!-- ── Filter Bar ── -->
  <div class="filter-bar" id="filterBar">
    <div class="ms-wrap" id="fBrand">
      <button class="ms-trigger" onclick="toggleFilter('fBrand')">
        <span>All Brands</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="ms-dropdown"><div class="ms-options"></div></div>
    </div>
    <div class="ms-wrap" id="fRegion">
      <button class="ms-trigger" onclick="toggleFilter('fRegion')">
        <span>All Regions</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="ms-dropdown"><div class="ms-options"></div></div>
    </div>
    <div class="ms-wrap" id="fDestination">
      <button class="ms-trigger" onclick="toggleFilter('fDestination')">
        <span>All Destinations</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="ms-dropdown"><div class="ms-options"></div></div>
    </div>
    <div class="ms-wrap" id="fDates">
      <button class="date-pill" onclick="toggleFilter('fDates')">
        <svg class="cal" width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="2" y="3" width="10" height="9" rx="1"/>
          <line x1="2" y1="6" x2="12" y2="6"/>
          <line x1="5" y1="1.5" x2="5" y2="4"/>
          <line x1="9" y1="1.5" x2="9" y2="4"/>
        </svg>
        <span class="date-range-text" id="fDatesLabel">15 Jan<span class="date-sep">–</span>28 Feb</span>
      </button>
      <div class="date-pill-popover">
        <label>From<input type="date" id="fDatesFrom" onchange="updateDatesLabel()"></label>
        <label>To<input type="date" id="fDatesTo" onchange="updateDatesLabel()"></label>
      </div>
    </div>
    <div class="ms-wrap" id="fRM">
      <button class="ms-trigger" onclick="toggleFilter('fRM')">
        <span>All RMs</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="ms-dropdown"><div class="ms-options"></div></div>
    </div>
  </div>

  <!-- ── Sub-tab Bar ── -->
  <div class="subtab-bar">
    <a href="pricing.html" class="subtab active">Vacation Packages</a>
    <a href="hotel.html"   class="subtab">Hotel Only</a>
    <a href="flight.html"  class="subtab">Flight Only</a>
    <div class="subtab-spacer"></div>
    <button class="btn btn-primary" onclick="runEvaluation()" style="margin-right:8px;">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="3,2 12,7 3,12" fill="currentColor" stroke="none"/></svg>
      Run Evaluation
    </button>
    <button class="btn btn-ghost" onclick="publishChanges()">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 7h10M7 2l5 5-5 5"/></svg>
      Publish Changes
    </button>
  </div>

  <!-- ── Main: Vacation Packages placeholder ── -->
  <div class="main">
    <div class="placeholder">
      <div class="placeholder-card">
        <div class="placeholder-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </div>
        <h2 class="placeholder-title">Vacation Packages</h2>
        <p class="placeholder-subtext">Coming soon — this module is under development.</p>
      </div>
    </div>
  </div><!-- /.main -->

</div><!-- /.app -->

<script>
// ── Filter bar / nav wiring (shared shell only, no table logic) ──
function toggleFilter(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.classList.contains('open');
  document.querySelectorAll('.ms-wrap.open').forEach(w => w.classList.remove('open'));
  if (!open) el.classList.add('open');
}
function toggleMenu() {
  document.getElementById('navDropdown').classList.toggle('open');
}
function updateDatesLabel() {
  const f = document.getElementById('fDatesFrom').value;
  const t = document.getElementById('fDatesTo').value;
  const fmt = s => {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return '';
    const mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${d.getDate()} ${mons[d.getMonth()]}`;
  };
  const a = fmt(f), b = fmt(t);
  const label = document.getElementById('fDatesLabel');
  if (a && b) label.innerHTML = `${a}<span class="date-sep">–</span>${b}`;
  else if (a) label.innerHTML = `${a}<span class="date-sep">–</span>…`;
  else if (b) label.innerHTML = `…<span class="date-sep">–</span>${b}`;
  else label.innerHTML = `15 Jan<span class="date-sep">–</span>28 Feb`;
}
function runEvaluation() {}
function publishChanges() {}

function populateFilters() {
  function setupDropdown(wrapId, values, onSelect) {
    const wrap = document.getElementById(wrapId);
    if (!wrap) return;
    const opts = wrap.querySelector('.ms-options');
    if (!opts) return;
    opts.innerHTML = values.map(v => `<div class="ms-option" data-value="${v}">${v}</div>`).join('');
    opts.querySelectorAll('.ms-option').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const val = el.dataset.value;
        const labelEl = wrap.querySelector('button span');
        if (labelEl) labelEl.textContent = val;
        wrap.classList.remove('open');
        if (onSelect) onSelect(val);
      });
    });
  }
  function destValuesFor(region) {
    const filtered = region === 'All Regions'
      ? DESTINATIONS
      : DESTINATIONS.filter(d => d.region === region);
    return ['All Destinations', ...filtered.map(d => d.name)];
  }
  setupDropdown('fBrand',   ['All Brands', ...BRANDS]);
  setupDropdown('fRegion',  ['All Regions', 'Caribbean', 'Mexico', 'Central America', 'Europe', 'Sun & Sand'], (val) => {
    const destWrap = document.getElementById('fDestination');
    if (destWrap) {
      const labelEl = destWrap.querySelector('button span');
      if (labelEl) labelEl.textContent = 'All Destinations';
    }
    setupDropdown('fDestination', destValuesFor(val));
  });
  setupDropdown('fDestination', destValuesFor('All Regions'));
  setupDropdown('fRM', REVENUE_MANAGERS);
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.ms-wrap')) {
    document.querySelectorAll('.ms-wrap.open').forEach(w => w.classList.remove('open'));
  }
  if (!e.target.closest('#menuBtn') && !e.target.closest('#navDropdown')) {
    document.getElementById('navDropdown').classList.remove('open');
  }
});

populateFilters();
</script>

</body>
</html>
